<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Insurance Fraud Detection</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
        }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 30px; font-weight: 800; }
        .header p { font-size: 14px; color: #aaa; margin-top: 8px; }
        .card {
            background: white; border-radius: 20px; padding: 40px;
            width: 100%; max-width: 650px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.4);
        }
        .card h2 { font-size: 18px; color: #302b63; margin-bottom: 24px;
            padding-bottom: 12px; border-bottom: 2px solid #f0f0f0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
        .form-group { display: flex; flex-direction: column; }
        label { font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
        input {
            padding: 11px 14px; border: 2px solid #e8e8e8;
            border-radius: 10px; font-size: 14px; color: #333; transition: all 0.3s;
        }
        input:focus { outline: none; border-color: #302b63; }
        button {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, #302b63, #e94560);
            color: white; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 24px;
            transition: opacity 0.3s;
        }
        button:hover { opacity: 0.9; }
        .result {
            margin-top: 24px; padding: 18px; border-radius: 12px;
            text-align: center; font-size: 17px; font-weight: 700;
        }
        .result.red { background:#fff0f0; color:#c0392b; border:2px solid #e74c3c; }
        .result.green { background:#f0fff4; color:#27ae60; border:2px solid #2ecc71; }
        .result.orange { background:#fff8f0; color:#e67e22; border:2px solid #f39c12; }
        .footer { color: #888; font-size: 13px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Insurance Fraud Detection</h1>
        <p>Powered by Machine Learning | Enter claim details below</p>
    </div>
    <div class="card">
        <h2>Claim Information</h2>
        <form action="/predict" method="POST">
            <div class="grid">
                <div class="form-group">
                    <label>Age of Insured</label>
                    <input type="number" name="age" placeholder="e.g. 35" required>
                </div>
                <div class="form-group">
                    <label>Policy Annual Premium ($)</label>
                    <input type="number" step="0.01" name="policy_annual_premium" placeholder="e.g. 1200.50" required>
                </div>
                <div class="form-group">
                    <label>Umbrella Limit ($)</label>
                    <input type="number" name="umbrella_limit" placeholder="e.g. 0" required>
                </div>
                <div class="form-group">
                    <label>Capital Gains ($)</label>
                    <input type="number" name="capital_gains" placeholder="e.g. 0" required>
                </div>
                <div class="form-group">
                    <label>Capital Loss ($)</label>
                    <input type="number" name="capital_loss" placeholder="e.g. 0" required>
                </div>
                <div class="form-group">
                    <label>Total Claim Amount ($)</label>
                    <input type="number" step="0.01" name="total_claim_amount" placeholder="e.g. 50000" required>
                </div>
                <div class="form-group">
                    <label>Bodily Injuries</label>
                    <input type="number" name="bodily_injuries" placeholder="e.g. 1" required>
                </div>
                <div class="form-group">
                    <label>Witnesses</label>
                    <input type="number" name="witnesses" placeholder="e.g. 2" required>
                </div>
                <div class="form-group">
                    <label>Incident Hour (0-23)</label>
                    <input type="number" name="incident_hour_of_the_day" placeholder="e.g. 14" required>
                </div>
                <div class="form-group">
                    <label>Vehicles Involved</label>
                    <input type="number" name="number_of_vehicles_involved" placeholder="e.g. 2" required>
                </div>
            </div>
            <button type="submit">Detect Fraud</button>
        </form>
        {% if prediction_text %}
        <div class="result {{ color }}">{{ prediction_text }}</div>
        {% endif %}
    </div>
    <div class="footer">Insurance Fraud Detection - ML Project</div>
</body>
</html>
